experimental:
  test_config: "all"
  models_to_train: "all"
  bus_systems: [33, 57, 118]
  data_mode: "train"
  train_timesteps: 10008
  test_timesteps: 24
  parallel_data_loading: true
  data_workers: 0
  pin_memory: false
  gradient_checkpointing: false
  save_checkpoints: true
  enable_logging: false
  clear_results: false

system:
  device: "cuda"
  num_buses: [33, 57, 118]
  test_cases: ["case33", "case57", "case118"]
  seed: 42

system_limits:
  case33:
    base_mva: 10.0
    v_min: 0.85
    v_max: 1.15
  case57:
    base_mva: 100.0
    v_min: 0.70
    v_max: 1.20
  case118:
    base_mva: 100.0
    v_min: 0.85
    v_max: 1.15

training:
  batch_size: 256
  learning_rate: 0.0005
  max_grad_norm: 1.0
  num_epochs: 50
  early_stopping_patience: 5
  gradient_accumulation_steps: 1
  use_learning_rate_scheduler: true
  cosine_annealing_lr:
    t_max: null
    eta_min: 0.00001
  weight_decay: 0.0001

physics:
  split_mode: "blocked_timeseries"
  splits:
    train: 0.6
    val: 0.2

data:
  hours_per_day: 24
  contingency_rate: 0.05
  pmu_coverage: 0.3

optimization:
  case33:
    num_seagulls: 4
    max_iterations: 5
  case57:
    num_seagulls: 4
    max_iterations: 5
  case118:
    num_seagulls: 4
    max_iterations: 5

model_capacity:
  bus_33: 'large'
  bus_57: 'large'
  bus_118: 'large'

moopf:
  weights:
    loss: 0.33333333
    voltage_deviation: 0.33333333
    carbon: 0.33333333

debug:
  train:
    show_detailed_progress: false
  test:
    show_detailed_progress: true
