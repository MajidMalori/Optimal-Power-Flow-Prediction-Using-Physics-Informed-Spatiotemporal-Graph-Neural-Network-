# ============================================================================
# YAML Configuration File for Physics-Informed Machine Learning Project
# ============================================================================
# This file provides a clean, version-controlled way to manage all configuration
# parameters. The Config class in config.py can load from this file.
#
# Usage:
#   - Edit this file to change configuration
#   - Command-line overrides: Use --config-override key=value
#   - Environment variables: Supported for sensitive values
#
# ============================================================================

# --- System & Device Configuration ---
system:
  device: "cuda"  # "cuda" or "cpu" - auto-detected if not specified
  num_buses: [33, 57, 118]
  test_cases: ["case33", "case57", "case118"]  # Default cases to run
  seed: 42
  num_workers: 2  # Data loading workers (auto-configured if 'auto')

# --- System-Specific Voltage Limits ---
# These are loaded based on CASE_NAME during runtime
system_limits:
  case33:
    v_min: 0.90
    v_max: 1.10
  case57:
    v_min: 0.90
    v_max: 1.10
  case118:
    v_min: 0.90
    v_max: 1.10

# --- Training Configuration ---
training:
  batch_size: 64
  learning_rate: 0.0005
  max_grad_norm: 1.0  # Gradient clipping
  num_epochs: 50
  early_stopping_patience: 10
  use_learning_rate_scheduler: true
  cosine_annealing_lr:
    t_max: null  # Auto-set to num_epochs if null
    eta_min: 0.000001
  weight_decay: 0.0

# --- Physics Configuration ---
physics:
  voltage:
    min: 0.90  # Default, overridden by system_limits
    max: 1.10  # Default, overridden by system_limits
  apparent_power_max: 1.2  # p.u.
  split_mode: "blocked_timeseries"  # Data split strategy
  splits:
    train: 0.6
    val: 0.2
    # test: 0.2 (implicit)

# --- Data Configuration ---
data:
  hours_per_day: 24
  sequence_length: 5  # For RNN models

# --- Model Capacity (Hidden Dimensions) ---
model_capacity:
  bus_33: 64
  bus_57: 128
  bus_118: 256

# --- MOOPF (Multi-Objective Optimal Power Flow) Weights ---
moopf:
  weights:
    loss: 0.33333333
    voltage_deviation: 0.33333333
    carbon: 0.33333333

# --- Contingency Analysis ---
contingency:
  enable: true
  top_k: 10  # Number of worst-case contingencies to analyze
  method: "power_flow"  # Method for contingency ranking

# --- Experimental Configuration ---
# These control what gets tested during experimental runs
experimental:
  test_config: true
  bus_systems: [33, 57, 118]
  models_to_train: ["GCN", "adaptiveGCN", "AdaptivePIGCN"]
  data_mode: "test"
  train_timesteps: 8760  # Full year
  test_timesteps: 2160   # 3 months
  plot_data_info: false
  force_cpu: false
  parallel_data_loading: true
  data_workers: 4
  save_results: true
  clear_results: false

# --- Debug Configuration ---
debug:
  enable: false  # Enable forensic logging (generates large log files)
  log_interval: 100  # Log every N forward passes
  log_gradients: false
  log_weights: false
