# ============================================================================
# YAML Configuration File for Physics-Informed Machine Learning Project
# ============================================================================
# This file provides a clean, version-controlled way to manage all configuration
# parameters. The Config class in config.py can load from this file.
#
# Usage:
#   - Edit this file to change configuration
#   - Command-line overrides: Use --config-override key=value
#   - Environment variables: Supported for sensitive values
#
# ============================================================================

# --- System & Device Configuration ---
system:
  device: "cuda"  # "cuda" or "cpu" - auto-detected if not specified
  num_buses: [33, 57, 118]
  test_cases: ["case33", "case57", "case118"]  # Default cases to run
  seed: 42
  num_workers: 2  # Data loading workers (auto-configured if 'auto')

# --- System-Specific Voltage Limits and BASE_MVA ---
# These are loaded based on CASE_NAME during runtime
# NOTE: These MUST match the limits used in data generation (data/validation.py)
system_limits:
  case33:
    base_mva: 10.0  # Distribution system (from pandapower case33bw)
    v_min: 0.85
    v_max: 1.15
  case57:
    base_mva: 100.0  # Transmission system (from pandapower case57)
    v_min: 0.70  # More relaxed for transmission
    v_max: 1.20
  case118:
    base_mva: 100.0  # Transmission system (from pandapower case118)
    v_min: 0.85
    v_max: 1.15

# --- Training Configuration ---
training:
  batch_size: 64
  learning_rate: 0.0005
  max_grad_norm: 1.0  # Gradient clipping
  num_epochs: 2
  early_stopping_patience: 10
  use_learning_rate_scheduler: true
  cosine_annealing_lr:
    t_max: null  # Auto-set to num_epochs if null
    eta_min: 0.000001
  weight_decay: 0.0

# --- Physics Configuration ---
physics:
  voltage:
    min: 0.90  # Default, overridden by system_limits
    max: 1.10  # Default, overridden by system_limits
  apparent_power_max: 1.2  # p.u.
  split_mode: "blocked_timeseries"  # Data split strategy
  splits:
    train: 0.6
    val: 0.2
    # test: 0.2 (implicit)

# --- Data Configuration ---
data:
  hours_per_day: 24
  sequence_length: 5  # For RNN models
  contingency_rate: 0.05  # Probability of line contingency per timestep
  pmu_coverage: 0.3  # Fraction of buses with PMU measurements

# --- Model Capacity (Hidden Dimensions) ---
# Options: 'normal' (conservative), 'medium' (balanced), 'large' (maximum)
model_capacity:
  bus_33: 'normal'    # 33-bus: normal=32-64, medium=48-96, large=64-128
  bus_57: 'normal'    # 57-bus: normal=32-64, medium=48-96, large=64-128
  bus_118: 'normal'   # 118-bus: normal=64-128, medium=96-160, large=128-256

# --- MOOPF (Multi-Objective Optimal Power Flow) Weights ---
moopf:
  weights:
    loss: 0.33333333
    voltage_deviation: 0.33333333
    carbon: 0.33333333

# --- Experimental Configuration ---
# These control what gets tested during experimental runs
experimental:
  # Model selection strategy (hierarchical):
  # 1. If models_to_train is set to specific models → Uses those (overrides test_config)
  # 2. If models_to_train is "all" or not set → Uses test_config
  
  # Option 1: Use test_config presets (convenient)
  # Options: quick, core, comprehensive, physics_only, non_physics_only, sequential_only, all
  # - quick: [AdaptivePIGCN] - fast testing
  # - core: [adaptiveGCN, AdaptivePIGCN] - best comparison
  # - comprehensive: [GCN, adaptiveGCN, AdaptivePIGCN, PIGCLSTM, PIGCGRU] - full comparison
  # - physics_only: All physics-informed models
  # - non_physics_only: [GCN, adaptiveGCN]
  # - sequential_only: All LSTM/GRU models
  # - all: ALL 7 MODELS
  test_config: "physics_only"
  
  # Option 2: Override with specific models (precise control)
  # Examples:
  # models_to_train: ["GCN"]  # Train only GCN
  # models_to_train: ["GCN", "adaptiveGCN"]  # Train only these two
  # models_to_train: "all"  # Use test_config above (default behavior)
  models_to_train: "all"  # Set to "all" to use test_config, or specify models to override  
  
  bus_systems: [118]
  data_mode: "test"
  train_timesteps: 1200  # Full year
  test_timesteps: 120   # 3 months
  plot_data_info: false
  force_cpu: false
  parallel_data_loading: true
  data_workers: 4
  save_results: true
  clear_results: false

# --- Debug Configuration ---
debug:
  enable: false  # Enable forensic logging (generates large log files)
  log_interval: 100  # Log every N forward passes
  log_gradients: false
  log_weights: false
