[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add the project root to PYTHONPATH so tests can import modules easily
pythonpath = .

# Optional: Add common command line options
addopts = -v --strict-markers

filterwarnings =
    ignore::DeprecationWarning:torch_geometric.*
    ignore::DeprecationWarning:torch.*
